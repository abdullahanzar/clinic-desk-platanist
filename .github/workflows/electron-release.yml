name: Release Windows Electron Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: electron-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-installer:
    name: Build Windows NSIS Installer
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate tag matches package version
        if: github.event_name == 'push'
        shell: bash
        run: |
          package_version=$(node -p "require('./package.json').version")
          tag_version=${GITHUB_REF_NAME#v}

          if [ "$package_version" != "$tag_version" ]; then
            echo "Tag version $tag_version does not match package.json version $package_version"
            exit 1
          fi

      - name: Detect signing configuration
        id: signing
        shell: pwsh
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          $signingReady = -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_BASE64) -and -not [string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_PASSWORD)

          if ($signingReady) {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host 'Windows signing certificate detected. The installer will be signed.'
          } else {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Warning 'Windows signing secrets are missing. The installer will be built unsigned and users may see SmartScreen warnings.'
          }

      - name: Prepare Windows signing certificate
        if: steps.signing.outputs.enabled == 'true'
        shell: pwsh
        env:
          WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
          WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_BASE64)) {
            throw 'Missing GitHub secret WINDOWS_CERT_BASE64.'
          }

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CERT_PASSWORD)) {
            throw 'Missing GitHub secret WINDOWS_CERT_PASSWORD.'
          }

          $certPath = Join-Path $env:RUNNER_TEMP 'windows-signing-cert.pfx'
          [System.IO.File]::WriteAllBytes($certPath, [Convert]::FromBase64String($env:WINDOWS_CERT_BASE64))

          "CSC_LINK=$certPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "CSC_KEY_PASSWORD=$env:WINDOWS_CERT_PASSWORD" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Build Windows NSIS installer
        run: pnpm run electron:dist:win

      - name: Report unsigned build
        if: steps.signing.outputs.enabled != 'true'
        shell: bash
        run: |
          echo "Built an unsigned Windows installer. Distribute with care because Windows may show trust warnings."

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-nsis-installer
          path: electron-dist/*.exe
          if-no-files-found: error

      - name: Publish GitHub release assets
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: electron-dist/*.exe
          generate_release_notes: true